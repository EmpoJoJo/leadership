
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smart Trash Detector</title>

    <!-- TensorFlow + Teachable Machine -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest"></script>

    <style>
        body {
          font-family: Arial, sans-serif;
          text-align: center;
          background: #f5f5f5;
          padding: 20px;
        }

        h1 {
          margin-bottom: 10px;
        }

        button {
          padding: 10px 20px;
          font-size: 16px;
          margin-bottom: 20px;
          cursor: pointer;
        }

        #webcam {
          border: 3px solid #333;
          border-radius: 10px;
          margin-top: 10px;
          width: 300px;
          height: 300px;
          object-fit: cover;
          background: #000;
        }

        #label {
          margin-top: 20px;
          font-size: 22px;
          font-weight: bold;
        }

        #status {
          margin-top: 12px;
          color: #444;
          font-size: 14px;
        }
    </style>
</head>

<body>
<h1>Smart Trash Detector</h1>
<p>Show an item to the camera and the AI will guess!</p>

<button id="startBtn" type="button">Start Camera</button>

<div>
    <video id="webcam" autoplay playsinline muted></video>
</div>

<div id="label">Waiting...</div>
<div id="status"></div>

<script>
    const MODEL_URL = "https://teachablemachine.withgoogle.com/models/axjNffSNy/";

    let model;
    let webcam;
    let isRunning = false;

    const webcamEl = document.getElementById("webcam");
    const labelEl = document.getElementById("label");
    const statusEl = document.getElementById("status");
    const startBtn = document.getElementById("startBtn");

    startBtn.addEventListener("click", init);

    async function init() {
      if (isRunning) return;
      startBtn.disabled = true;
      statusEl.textContent = "Loading model and requesting camera permission...";

      try {
        model = await tmImage.load(MODEL_URL + "model.json", MODEL_URL + "metadata.json");

        webcam = new tmImage.Webcam(300, 300, true);
        await webcam.setup(); // prompts for webcam permission
        await webcam.play();

        // Teachable Machine webcam has an underlying HTMLVideoElement.
        // Put that directly into our <video> tag.
        webcamEl.srcObject = webcam.webcam.srcObject;

        isRunning = true;
        statusEl.textContent = "Camera started. Detecting...";
        window.requestAnimationFrame(loop);
      } catch (error) {
        console.error(error);
        labelEl.textContent = "Could not start camera";
        statusEl.textContent =
          "Check browser camera permission, use HTTPS or localhost, and ensure no other app is using the camera.";
        startBtn.disabled = false;
      }
    }

    async function loop() {
      if (!isRunning) return;

      webcam.update();
      await predict();
      window.requestAnimationFrame(loop);
    }

    async function predict() {
      const prediction = await model.predict(webcam.canvas);

      let highest = prediction[0];
      for (const p of prediction) {
        if (p.probability > highest.probability) {
          highest = p;
        }
      }

      labelEl.textContent = `Detected: ${highest.className}`;
    }
</script>
</body>
</html>
